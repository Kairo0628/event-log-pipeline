  db:
    image: postgres:16
    restart: always
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - 5432:5432
    hostname: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d events"]
      interval: 15s
      timeout: 5s
      retries: 5
#    networks:
#      - metanet1

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
#    networks:
#      - metanet1

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: events
      DB_USER: admin
      DB_PASSWORD: admin

volumes:
  postgres-db-volume:

